site_name: LDTool — Level Diagram Toolbox
site_description: MATLAB toolbox for interactive Pareto front visualisation using Level Diagrams
site_author: X. Blasco

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - API Reference:
    - LevelDiagram: api/LevelDiagram.md
    - Concept: api/Concept.md
    - Utility functions: api/utilities.md
